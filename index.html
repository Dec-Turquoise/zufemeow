<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>喵喵消消乐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">
    <header class="header">
      <h1>🐱 喵喵消消乐</h1>
      <div class="stats">
        <div class="stat">
          <span class="label">关卡</span>
          <span id="level" class="value">1</span>
        </div>
        <div class="stat">
          <span class="label">得分</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">步数</span>
          <span id="moves" class="value">30</span>
        </div>
        <div class="stat">
          <span class="label">目标</span>
          <span id="target" class="value">5000</span>
        </div>
      </div>
    </header>

    <main class="board-area">
      <div class="board-container">
        <div id="board" class="board" aria-label="游戏棋盘"></div>
        <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
      </div>
      <div id="overlay" class="overlay hidden">
        <div class="modal">
          <p id="overlay-msg">恭喜过关！</p>
          <button id="next-level-btn" type="button" class="hidden">下一关</button>
          <button id="restart-btn" type="button">重新开始</button>
        </div>
      </div>
    </main>
  </div>
  <script src="game.js"></script>
</body>
</html>
